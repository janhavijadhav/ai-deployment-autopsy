version: "3.9"

# ─── AI Deployment Autopsy — Full Stack ────────────────────────────────────────
# Spins up: Agent API, Qdrant, Redis, LangFuse, Postgres (LangFuse backend),
#            Prometheus, Grafana, and a mock Supplier API.
#
# Usage:  make up
# ─────────────────────────────────────────────────────────────────────────────

x-common-env: &common-env
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
  LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY}
  LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY}
  LANGFUSE_HOST: http://langfuse:3000
  QDRANT_URL: http://qdrant:6333
  REDIS_URL: redis://redis:6379
  DUCKDB_PATH: /data/procurement.duckdb
  SQLITE_PATH: /data/sap_mirror.db
  SUPPLIER_API_BASE_URL: http://supplier-mock:8001

services:

  # ── Procurement Agent API ────────────────────────────────────────────────────
  agent:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
      - "9091:9091"   # Prometheus metrics scrape port
    environment:
      <<: *common-env
    volumes:
      - ./data:/data
    depends_on:
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
      langfuse:
        condition: service_started
    restart: unless-stopped

  # ── Mock Supplier REST API ───────────────────────────────────────────────────
  supplier-mock:
    build:
      context: .
      dockerfile: Dockerfile.mock
    ports:
      - "8001:8001"
    restart: unless-stopped

  # ── Qdrant Vector Store ──────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.12.1
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Redis Cache ──────────────────────────────────────────────────────────────
  redis:
    image: redis:7.4-alpine
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ── LangFuse (Self-hosted) ───────────────────────────────────────────────────
  langfuse:
    image: langfuse/langfuse:2
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://langfuse:langfuse@langfuse-db:5432/langfuse
      NEXTAUTH_SECRET: changeme_in_prod_32chars_minimum
      SALT: changeme_in_prod_32chars_minimum
      NEXTAUTH_URL: http://localhost:3000
      TELEMETRY_ENABLED: "false"
    depends_on:
      langfuse-db:
        condition: service_healthy
    restart: unless-stopped

  langfuse-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: langfuse
      POSTGRES_DB: langfuse
    volumes:
      - langfuse_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # ── Prometheus ───────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v3.0.0
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    restart: unless-stopped

  # ── Grafana ──────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.3.0
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  qdrant_storage:
  langfuse_db:
  grafana_data:
