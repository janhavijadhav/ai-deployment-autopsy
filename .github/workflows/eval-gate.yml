name: Eval Gate — Block deploy on regression

on:
  push:
    branches: [main, "fix/*", "feature/*"]
  pull_request:
    branches: [main]

env:
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
  LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}

jobs:

  # ── 1. Schema drift check ───────────────────────────────────────────────────
  schema-check:
    name: Schema drift detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Seed database
        run: python -m data.seed_data
      - name: Take baseline snapshot
        run: python -m src.data.schema_monitor snapshot --label ci_baseline
      - name: Check for schema drift
        run: python -m src.data.schema_monitor diff
        # Exits 1 if drift detected — blocks downstream jobs

  # ── 2. Clean eval suite ─────────────────────────────────────────────────────
  eval-clean:
    name: Clean eval suite (regression guard)
    runs-on: ubuntu-latest
    needs: schema-check
    services:
      redis:
        image: redis:7.4-alpine
        ports:
          - 6379:6379
      qdrant:
        image: qdrant/qdrant:v1.12.1
        ports:
          - 6333:6333
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Seed data + ingest contracts
        run: |
          python -m data.seed_data
          python -m src.rag.pipeline ingest --contracts-dir data/contracts/
      - name: Run clean eval suite
        run: python -m src.evals.eval_runner --mode clean
      - name: Upload eval report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-report-clean-${{ github.sha }}
          path: eval_results/

  # ── 3. Adversarial eval suite ───────────────────────────────────────────────
  eval-adversarial:
    name: Adversarial eval suite (distribution gap check)
    runs-on: ubuntu-latest
    needs: schema-check
    services:
      redis:
        image: redis:7.4-alpine
        ports:
          - 6379:6379
      qdrant:
        image: qdrant/qdrant:v1.12.1
        ports:
          - 6333:6333
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Seed data + ingest contracts
        run: |
          python -m data.seed_data
          python -m src.rag.pipeline ingest --contracts-dir data/contracts/
      - name: Generate adversarial test cases
        run: python -m src.evals.adversarial_gen --count 50
      - name: Run adversarial eval suite
        run: python -m src.evals.eval_runner --mode adversarial
        # Exits 1 if adversarial pass rate < 90% — blocks deploy
      - name: Upload adversarial eval report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-report-adversarial-${{ github.sha }}
          path: eval_results/

  # ── 4. Faithfulness gate ────────────────────────────────────────────────────
  eval-faithfulness:
    name: LLM-as-judge faithfulness gate
    runs-on: ubuntu-latest
    needs: [eval-clean, eval-adversarial]
    services:
      qdrant:
        image: qdrant/qdrant:v1.12.1
        ports:
          - 6333:6333
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Run faithfulness check
        run: python -m src.evals.llm_judge --check faithfulness
        # Blocks if avg faithfulness < 0.85 (Failure 1 regression)

  # ── 5. Unit tests ───────────────────────────────────────────────────────────
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: pytest tests/ -v --cov=src --cov-report=xml
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ github.sha }}
          path: coverage.xml
