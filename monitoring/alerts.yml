groups:
  - name: procurement_agent_alerts
    rules:

      # ── Latency SLA ──────────────────────────────────────────────────────────
      - alert: AgentLatencyP95High
        expr: |
          histogram_quantile(0.95,
            rate(procurement_agent_llm_latency_ms_bucket[5m])
          ) > 3000
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Agent p95 latency > 3s SLA"
          description: "p95 latency is {{ $value | humanize }}ms. SLA is 3000ms."

      - alert: AgentLatencyP99Critical
        expr: |
          histogram_quantile(0.99,
            rate(procurement_agent_llm_latency_ms_bucket[5m])
          ) > 8000
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Agent p99 latency > 8s — degraded service"
          description: "Failure 2 pattern detected. Check: sequential tools, Redis cache health."

      # ── Auth failures (Failure 5 indicator) ──────────────────────────────────
      - alert: OAuthRefreshFailureSpike
        expr: |
          rate(procurement_agent_oauth_token_refresh_total{success="false"}[5m]) > 0.1
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "OAuth2 token refresh failures detected"
          description: "Auth failure rate: {{ $value | humanizePercentage }}. Failure 5 pattern. Check mutex lock health."

      # ── Cache health ──────────────────────────────────────────────────────────
      - alert: CacheHitRateLow
        expr: |
          rate(procurement_agent_cache_hits_total[10m]) /
          (rate(procurement_agent_cache_hits_total[10m]) + rate(procurement_agent_cache_misses_total[10m]))
          < 0.20
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Semantic cache hit rate below 20%"
          description: "Cache may be misconfigured or Redis unavailable. Current rate: {{ $value | humanizePercentage }}"

      # ── Schema drift (Failure 4 indicator) ───────────────────────────────────
      - alert: SchemaDriftDetected
        expr: rate(procurement_agent_schema_drift_total[1m]) > 0
        labels:
          severity: critical
        annotations:
          summary: "Schema drift detected"
          description: "Database schema changed vs baseline. Severity: {{ $labels.severity }}. Check schema_monitor diff output."
